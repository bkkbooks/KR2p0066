body:
  text: 思民之初生多險以難成親之以康樂慝之以凶刑心目及言是善敗之經參節之未得舍命乃縈攖不可闔用曰褻君褻戾柬柬檢檢疏疏事非與有方稱方重德冒難犯殃非憮於富亦力勉毋忘君慎其有成德閉言焉自關抗其有中墨良人貞正安焉難之少稍足於㝅亦不褻於賊用曰遠君遠戾德徑于康攝好棄尤五刑不行陰則或又陰陽則或又陽民日愈樂轉相代耕功之亡無敵而亦不可難之而亦弗能棄用曰寧事赫赫貞蟲飛鳶受物于天民之作物唯言之有信視前顧後九久惠是貞正用曰錯庶心懷惟各有其異緒圖絶源流淲澽乾其古胡能不涸用曰脣亡齒寒凡恭人非人是恭厥身是衛踐其有綸紀則方由而弗可矣用曰咎群言之棄慢慢簡簡其容之怍惜坎坎險險自視之泊薄貞誠可慎哉其言之娓選擇龔恐有武𧺴心德樹惠蓄定誠保之亟非稷之種而可飲食積盈天之下而莫之能得用曰自其有保貨寧有保德違難流言以忘民德內間諑衆而紛其反側禍不降自天亦不出自地唯心自賊用曰之襲春秋還轉而除既及用曰勞人亡徒謂天高而不暨謂地厚而不達言焉在家室而莫褻朕舌倡為惡謀愛亂節僭行冒還厥辟以民作康若罔之未發而自嘉樂伺民之降凶而亦不可逃用曰舉罕於野既出於口則弗可悔若矢之免於弦用曰囁其禍而不可復舌非巧辨慎良以稼穡則行口不忌期於天而忌期於人唯君之賈臣非貨以酬有莊在心嘉德吉猷謀心莊之既權正民乃導凶刑厲政玫其若巨用曰毋事莫莫強君豪政揚武於外克獵戎事以損四踐制法即刑極民戰敗必其有繼緒圖而難其有惠民宦於朝夕而巧於左右褻而不難告衆之所畏忌請命之所對察而言忤之所起罪之枝葉良人可思鰥敬之身施文惠武恭淑以成務之以元色簡其有恆形疐其有威容而安其有寧用亡咎惟盈用曰莫衆而迷競之不過骨而展之亦不能違衆孽諫羞聞惡謀事既無功衆人亡文言以為章起事作志睿徇其有中成博圖裕衆以勉民生邇設立師長建設之政話諫敹錯口定有紀而亦不可阻民道繁多而亦不可固或眛其不見不昭其甚明或泯泯之不達而散其奇彰進退需立而
